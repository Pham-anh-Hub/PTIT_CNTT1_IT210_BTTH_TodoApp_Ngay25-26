spring.application.name=PTIT_CNTT1_IT210_Personal-Todo-App


# Cấu hình ThymeLeaf
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false

# Cấu hình data source
spring.datasource.url=jdbc:mysql://localhost:3306/todo_list_app?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=123456789


# Cấu hình JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.show_sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# cấu hình orm tên các cột và table
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl

