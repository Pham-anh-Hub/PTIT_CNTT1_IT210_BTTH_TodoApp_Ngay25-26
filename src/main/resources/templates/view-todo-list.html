<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Title</title>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<style>
    .low{
        background: #D5EDBB;
        color: #34784C;
        padding: 4px 10px;
        border-radius: 12px;
        display: inline-block;
        font-size: 12px;
        font-weight: 600;
    }
    .medium{
        background: #FFE39F;
        color: #543B0A;
        padding: 4px 10px;
        border-radius: 12px;
        display: inline-block;
        font-size: 12px;
        font-weight: 600;
    }
    .high{
        background: #FFCEC9;
        color: #AA383B;
        padding: 4px 10px;
        border-radius: 12px;
        display: inline-block;
        height: fit-content;
        font-size: 12px;
        font-weight: 600;
    }
    .pending {
        background: #E0E7FF;
        color: #3730A3;
        padding: 4px 10px;
        border-radius: 12px;
        display: inline-block;font-size: 12px;
        font-weight: 600;
    }

    .in_progress {
        background: #C7F9CC;
        color: #1B5E20;
        padding: 4px 10px;
        border-radius: 12px;
        display: inline-block;font-size: 12px;
        font-weight: 600;
    }

    .completed {
        background: #D1D5DB;
        color: #374151;
        padding: 4px 10px;
        border-radius: 12px;
        display: inline-block;font-size: 12px;
        font-weight: 600;
    }

    .success{
        background: #C7F9CC;
        color: #1B5E20;
        width: fit-content;
        padding: 8px;
        border-radius: 12px;
        margin: 8px;
    }
</style>
<body>

<nav class="navbar navbar-light bg-light" style="display: flex; width:100%; justify-content: space-between">
    <a class="navbar-brand" href="#" style="font-weight: 550">My Todo App</a>
    <form class="form-inline my-2 my-lg-0">
        <input class="form-control mr-sm-2" type="text" placeholder="Search">
        <button class="btn btn-outline-success my-2 my-sm-0" type="submit">Search</button>
    </form>
</nav>

<h2 class="text-center" style="margin: 20px auto">Todo List</h2>

<div style="display: flex; justify-content: flex-end">
    <a style="margin:15px 80px" class="btn btn-outline-primary" th:href="@{/todo/view-add}" role="button">Thêm mới công việc</a>
</div>

<table class="table table-striped table-inverse mx-auto" style="width: 90%">
    <thead class="thead-inverse">
    <tr>
        <th>ID</th>
        <th>Content</th>
        <th>Due Date</th>
        <th>Status</th>
        <th>Priority</th>
        <th colspan="2">Action</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="todo : ${todoList}" th:object="${todo}">
        <td th:text="*{id}"></td>
        <td th:text="*{content}"></td>
        <td th:text="*{dueDate}"></td>
        <td>
            <span th:class="${todo.status.name().toLowerCase()}"
                  th:text="${#strings.replace(todo.status.name().toLowerCase(), '_', ' ')}">
            </span>
        </td>
        <td>
            <span th:class="${todo.priority.name().toLowerCase()}"
                  th:text="${todo.priority.name().toLowerCase()}">
            </span>
        </td>
        <td>
            <a class="btn btn-warning text-light" th:href="@{/todo/view-edit/{id}(id=${todo.id})}">Sửa</a>
        </td>
        <td>
            <a class="btn btn-danger text-light"
               th:href="@{/todo/delete-todo/{id}(id=${todo.id})}"
               th:data-name="${todo.content}"
               onclick="return confirm('Bạn có chắc chắn xóa công việc ' + this.dataset.name + '?')">
                Xóa
            </a>
        </td>
    </tr>
    </tbody>
</table>

<div class="success" th:if="${messages} != null" id="message" th:text="${messages}"></div>

<!-- Optional JavaScript -->
<!-- jQuery first, then Popper.js, then Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
</body>
</html>
