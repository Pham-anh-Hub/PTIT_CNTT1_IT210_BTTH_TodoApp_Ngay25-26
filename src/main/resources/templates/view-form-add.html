<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Title</title>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<body>

<h2 th:unless="${onEdit}" style="margin: 20px auto; text-align: center">Thêm mới công việc</h2>
<h2 th:if="${onEdit}" style="margin: 20px auto; text-align: center">Cập nhật công việc</h2>
<form th:action="${onEdit ? '/todo/handle-edit' : '/todo/handle-add'}" th:object="${todoDTO}" method="post" style="width: 70%; margin: 0 auto">
    <input type="hidden" th:field="*{id}">
    <div class="form-group">
        <label for="">Nội dung công việc</label>
        <input th:field="*{content}" type="text" class="form-control" placeholder="">
        <p th:if="${#fields.hasErrors('content')}" th:errors="*{content}" class="form-text text-sm text-danger"></p>
    </div>
    <div class="form-group">
        <label for="">Deadline</label>
        <input th:field="*{dueDate}" type="date" class="form-control" placeholder="">
        <p th:if="${#fields.hasErrors('dueDate')}" th:errors="*{dueDate}" class="form-text text-sm text-danger">Help text</p>
    </div>
    <div class="form-group">
        <label for="">Trạng thái</label>
        <select th:field="*{status}" class="form-control">
            <option value="PENDING">Pending</option>
            <option value="IN_PROGRESS">In progress</option>
            <option value="COMPLETED">Completed</option>
        </select>
    </div>
    <div class="form-group">
        <label for="">Độ ưu tiên</label>
        <select th:field="*{priority}" class="form-control">
            <option value="LOW">Low</option>
            <option value="MEDIUM">Medium</option>
            <option value="HIGH">High</option>
        </select>
    </div>

    <button th:unless="${onEdit}" class="btn btn-primary" type="submit">Thêm</button>
    <button th:if="${onEdit}" class="btn btn-primary" type="submit">Cập nhật</button>


    <a type="button" class="btn btn-outline-secondary" th:href="@{/todo/list}">Quay về danh sách</a>
</form>


<!-- Optional JavaScript -->
<!-- jQuery first, then Popper.js, then Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
</body>
</html>
